<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Color Changer</title>
    <link rel="stylesheet" href="color.css">
</head>
<body>
    <h1>Dynamic Color Changer (Color Picker)</h1>
    
    <div id="colorBox" class="color-box"></div>
    
    <div class="control">
        <label for="colorInput">Pick a color:</label>
        <input type="color" id="colorInput" value="#3498db">
    </div>
    
    <button id="resetButton">Reset to Default</button>
    
    <script src="color.js"></script>
</body>
</html>
